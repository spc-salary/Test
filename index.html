<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minimalist Pomodoro</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --accent: #6d5dfc;
            --shadow: #a3b1c6;
            --light: #ffffff;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background 1s ease;
        }

        .container {
            width: 350px;
            padding: 30px;
            border-radius: 30px;
            background: var(--bg);
            box-shadow: 20px 20px 60px var(--shadow), -20px -20px 60px var(--light);
            text-align: center;
        }

        #timer-display {
            font-size: 4rem;
            font-weight: 800;
            color: #444;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin: 20px 0;
        }

        #controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        button {
            border: none;
            outline: none;
            padding: 15px;
            border-radius: 15px;
            background: var(--bg);
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--light);
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.2s ease;
        }

        button:active {
            box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--light);
            color: var(--accent);
        }

        .task-input {
            width: 80%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--bg);
            box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--light);
            outline: none;
            margin-bottom: 20px;
        }

        #task-list {
            list-style: none;
            padding: 0;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }

        .task-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            background: var(--bg);
            box-shadow: 3px 3px 6px var(--shadow);
            font-size: 0.9rem;
            color: #555;
            display: flex;
            justify-content: space-between;
        }

        .working { --bg: #f0e4e4; }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div style="font-size: 0.8rem; letter-spacing: .2px; color: #888;">FOCUS FLOW</div>
        <div id="timer-display">25:00</div>
        <div id="controls">
            <button id="start">Start</button>
            <button id="reset">Reset</button>
        </div>
        <input type="text" id="task-input" class="task-input" placeholder="What are we doing?">
        <ul id="task-list"></ul>
    </div>

    <script>
        let timeLeft = 25 * 60;
        let timerId = null;
        const display = document.getElementById('timer-display');
        const startBtn = document.getElementById('start');
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        startBtn.addEventListener('click', () => {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                startBtn.textContent = 'Start';
                document.body.classList.remove('working');
            } else {
                startBtn.textContent = 'Pause';
                document.body.classList.add('working');
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        alert('Focus session complete!');
                    }
                }, 1000);
            }
        });

        document.getElementById('reset').addEventListener('click', () => {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            startBtn.textContent = 'Start';
            document.body.classList.remove('working');
            updateDisplay();
        });

        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && taskInput.value.trim() !== "") {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.innerHTML = `<span>${taskInput.value}</span><span style="cursor: pointer" onclick="this.parentElement.remove()">x</span>`;
                taskList.appendChild(li);
                taskInput.value = "";
            }
        });
    </script>
</body>
</html>
